const WV=[{ry:.25,a:18,f:.007,sp:.008,ph:0,op:.05},{ry:.45,a:14,f:.011,sp:.012,ph:2.1,op:.045},
          {ry:.65,a:17,f:.008,sp:.009,ph:4.2,op:.04},{ry:.82,a:12,f:.013,sp:.015,ph:1.0,op:.035}];
function drawWaves(){

    w.ph+=w.sp; const by=wvCv.height*w.ry;
    wvCx.beginPath();wvCx.moveTo(0,by);
    for(let x=0;x<=wvCv.width;x+=3){const y=by+Math.sin(x*w.f+w.ph)*w.a+Math.sin(x*w.f*1.7+w.ph*.6)*(w.a*.35);wvCx.lineTo(x,y);}
    wvCx.lineTo(wvCv.width,wvCv.height);wvCx.lineTo(0,wvCv.height);wvCx.closePath();
    const g=wvCx.createLinearGradient(0,by-w.a,0,by+w.a*2);
    g.addColorStop(0,`rgba(255,255,255,${w.op})`);g.addColorStop(.5,`rgba(10,132,255,${w.op*.5})`);g.addColorStop(1,'rgba(0,0,0,0)');

    wvCx.strokeStyle=`rgba(180,210,255,${w.op*1.8})`;wvCx.lineWidth=.8;wvCx.stroke();
  });
  requestAnimationFrame(drawWaves);
}

    };
    src.start(0);return true;
  }catch(e){ocupado=false;return false;}
}

/* ── SPEECH ── */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recAtivo=null,ativo=false,pauseTimer=null,transcriptAcum='';

// Detecta intenção de escrita na pergunta
function detectarEscrita(txt){
  const gatilhos=['escreve','escreva','anota','anote','registra','registre','coloca no texto','salva','salve','texto:','digite','digita'];
  return gatilhos.some(g=>txt.toLowerCase().includes(g));
}

// Extrai o que deve ser escrito
function extrairTextoParaEscrever(txt){
  const prefixos=['escreve ','escreva ','anota ','anote ','registra ','registre ','salva ','salve ','digita ','digite ','texto: ','texto:'];
  let result=txt;
  for(const p of prefixos){
    const idx=result.toLowerCase().indexOf(p);
    if(idx!==-1){result=result.slice(idx+p.length);break;}
  }
  return result.trim();
}

function iniciar(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ov=document.getElementById('overlay');
  ov.classList.add('hide');setTimeout(()=>ov.style.display='none',900);
  ativo=true;escutarWake();
}

function pararRec(){
  if(recAtivo){try{recAtivo.stop();}catch(e){}recAtivo=null;}
  clearTimeout(pauseTimer);
}

// WAKE WORD — sempre ouvindo
function escutarWake(){
  if(!SR||!ativo||ocupado||sistemaSeguro) return;
  pararRec();setModo('standby');
  const rec=new SR();
  rec.lang='pt-BR';rec.continuous=false;rec.interimResults=false;rec.maxAlternatives=3;
  recAtivo=rec;
  rec.onresult=(e)=>{
    for(let r=0;r<e.results.length;r++){
      for(let a=0;a<e.results[r].length;a++){
        const txt=e.results[r][a].transcript.toLowerCase().trim();
        if(['jarvis','jarves','jarvi','jarviz'].some(w=>txt.includes(w))){
          recAtivo=null;ouvirComando();return;
        }
      }
    }
    recAtivo=null;escutarWake();
  };
  rec.onerror=()=>{recAtivo=null;if(ativo&&!ocupado&&!sistemaSeguro) setTimeout(escutarWake,300);};
  rec.onend=()=>{if(recAtivo===rec)recAtivo=null;if(ativo&&!ocupado&&!sistemaSeguro&&orbModo==='standby') setTimeout(escutarWake,100);};
  try{rec.start();}catch(e){recAtivo=null;setTimeout(escutarWake,500);}
}

// COMANDO — ouve o que o usuário quer
function ouvirComando(){
  if(ocupado||sistemaSeguro) return;
  pararRec();setModo('ouvindo');
  transcriptAcum='';trEl.textContent='';
  const rec=new SR();
  rec.lang='pt-BR';rec.continuous=true;rec.interimResults=true;rec.maxAlternatives=1;
  recAtivo=rec;
  rec.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) final+=t; else interim+=t;
    }
    if(final) transcriptAcum+=final;
    trEl.textContent=transcriptAcum||interim;
    clearTimeout(pauseTimer);
    if(transcriptAcum||final){
      pauseTimer=setTimeout(()=>{
        const p=transcriptAcum.trim();
        if(p&&!ocupado){try{rec.stop();}catch(e){}recAtivo=null;processarComando(p);}
      },1600);
    }
  };
  rec.onerror=()=>{
    clearTimeout(pauseTimer);recAtivo=null;
    const p=transcriptAcum.trim();
    if(p&&!ocupado) processarComando(p);
    else if(!ocupado){setModo('standby');trEl.textContent='';setTimeout(escutarWake,200);}
  };
  rec.onend=()=>{
    clearTimeout(pauseTimer);if(recAtivo===rec)recAtivo=null;
    if(orbModo==='ouvindo'&&!ocupado){
      const p=transcriptAcum.trim();
      if(p) processarComando(p);
      else{setModo('standby');trEl.textContent='';setTimeout(escutarWake,200);}
    }
  };
  try{rec.start();}catch(e){recAtivo=null;setModo('standby');setTimeout(escutarWake,500);}
}

// PROCESSAR COMANDO — decide o que fazer
async function processarComando(pergunta){
  if(ocupado||sistemaSeguro) return;

  // CHAVE DE SEGURANÇA
  if(FRASE_SEGURA.some(f=>pergunta.toLowerCase().includes(f))){
    ativarModoSeguro(); return;
  }

  // MODO ESCRITA — Jarvis escreve na tela
  if(detectarEscrita(pergunta)){
    const textoParaEscrever=extrairTextoParaEscrever(pergunta);
    ocupado=true;pararRec();setModo('processando');
    try{
      const res=await fetch('/perguntar',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          pergunta:`O usuário pediu para você escrever/anotar o seguinte: "${textoParaEscrever}". Confirme brevemente por voz que anotou e formate o texto de forma limpa para exibição. Retorne no formato JSON: {"confirmacao":"texto falado","texto_formatado":"texto para tela"}`,
          user_id:USER_ID
        }),
        signal:AbortSignal.timeout(20000)
      });
      const dados=await res.json();
      let confirmacao=dados.resposta, textoFmt=textoParaEscrever;
      try{
        const json=JSON.parse(dados.resposta.replace(/```json|```/g,'').trim());
        confirmacao=json.confirmacao||dados.resposta;
        textoFmt=json.texto_formatado||textoParaEscrever;
      }catch(e){}
      setModo('escrevendo');
      mostrarTexto(textoFmt, true);
      if(dados.audio){await tocarAudio(dados.audio);}
      else{ocupado=false;setModo('standby');setTimeout(escutarWake,300);}
    }catch(err){
      ocupado=false;setModo('standby');trEl.textContent='';setTimeout(escutarWake,300);
    }
    return;
  }

  // PERGUNTA NORMAL
  ocupado=true;pararRec();setModo('processando');trEl.textContent=pergunta;
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),20000);
  try{
    const res=await fetch('/perguntar',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pergunta,user_id:USER_ID}),
      signal:controller.signal
    });
    clearTimeout(timeout);
    if(!res.ok) throw new Error('API '+res.status);
    const dados=await res.json();
    if(dados.erro) throw new Error(dados.erro);
    setModo('falando');audioPendente=dados.audio;
    const ok=await tocarAudio(dados.audio);
    if(!ok){ocupado=false;setModo('standby');setTimeout(escutarWake,300);}
  }catch(err){
    clearTimeout(timeout);ocupado=false;setModo('standby');trEl.textContent='';
    setTimeout(escutarWake,300);
  }
}

// Toque no orb para ativar manualmente (backup)
orb.addEventListener('click',()=>{if(ativo&&orbModo==='standby'&&!ocupado&&!sistemaSeguro) ouvirComando();});
</script>
