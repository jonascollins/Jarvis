<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<style>
  body { background:#000; color:#fff; font-family:Arial; padding:40px; }
  button { background:#00BFFF; color:#000; border:none; padding:15px 30px; font-size:16px; margin:10px; border-radius:8px; cursor:pointer; display:block; width:250px; }
  #log { background:#111; padding:20px; margin-top:20px; border-radius:8px; min-height:200px; font-size:13px; line-height:1.8; }
  #status { color:#00BFFF; font-size:18px; margin:20px 0; }
</style>
</head>
<body>
<h2 style="color:#00BFFF">JARVIS 2.0</h2>
<div id="status">Pronto</div>
<button onclick="testarServidor()">🔌 Testar Servidor</button>
<button onclick="testarMicrofone()">🎤 Testar Microfone</button>
<button onclick="perguntarJarvis()">🤖 Perguntar ao JARVIS</button>
<div id="log">Log aparece aqui...</div>

<script>
function log(msg) {
  document.getElementById("log").innerHTML += "<br>" + new Date().toLocaleTimeString() + " → " + msg;
}

async function testarServidor() {
  log("Testando servidor...");
  try {
    const res = await fetch("/perguntar", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({pergunta: "oi", user_id: "jonas"})
    });
    const dados = await res.json();
    log("✅ Servidor OK! Resposta: " + dados.resposta);
    if (dados.audio) {
      log("✅ Áudio recebido!");
      tocarAudio(dados.audio);
    }
  } catch(e) {
    log("❌ Erro: " + e.message);
  }
}

async function tocarAudio(base64) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const bin = atob(base64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const buf = await ctx.decodeAudioData(bytes.buffer);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    log("✅ Áudio tocando!");
  } catch(e) {
    log("❌ Erro no áudio: " + e.message);
  }
}

function testarMicrofone() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { log("❌ SpeechRecognition não suportado!"); return; }
  log("Microfone iniciando...");
  const rec = new SR();
  rec.lang = "pt-BR";
  rec.onstart = () => log("✅ Microfone ativo! Fale algo...");
  rec.onresult = (e) => log("✅ Ouvi: " + e.results[0][0].transcript);
  rec.onerror = (e) => log("❌ Erro microfone: " + e.error);
  rec.onend = () => log("Microfone parou");
  rec.start();
}

function perguntarJarvis() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { log("❌ SpeechRecognition não suportado!"); return; }
  log("Fale sua pergunta...");
  document.getElementById("status").textContent = "Ouvindo...";
  const rec = new SR();
  rec.lang = "pt-BR";
  rec.onresult = async (e) => {
    const pergunta = e.results[0][0].transcript;
    log("Você disse: " + pergunta);
    document.getElementById("status").textContent = "Processando...";
    try {
      const res = await fetch("/perguntar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({pergunta, user_id: "jonas"})
      });
      const dados = await res.json();
      log("JARVIS: " + dados.resposta);
      document.getElementById("status").textContent = "Falando...";
      await tocarAudio(dados.audio);
      document.getElementById("status").textContent = "Pronto";
    } catch(e) {
      log("❌ Erro: " + e.message);
      document.getElementById("status").textContent = "Erro";
    }
  };
  rec.onerror = (e) => { log("❌ Erro: " + e.error); document.getElementById("status").textContent = "Erro"; };
  rec.start();
}
</script>
</body>
</html>
