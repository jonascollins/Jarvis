<script>
/* ════════════════════════════════
   LIQUID WAVE BACKGROUND
════════════════════════════════ */
const wvCv = document.getElementById('waves');
const wvCx = wvCv.getContext('2d');
function rsz(){ wvCv.width=innerWidth; wvCv.height=innerHeight; }
rsz(); addEventListener('resize', rsz);

const WV = [
  {ry:.25,a:18,f:.007,sp:.008,ph:0,   op:.05},
  {ry:.45,a:14,f:.011,sp:.012,ph:2.1, op:.045},
  {ry:.65,a:17,f:.008,sp:.009,ph:4.2, op:.04},
  {ry:.82,a:12,f:.013,sp:.015,ph:1.0, op:.035},
];
function drawWaves(){
  wvCx.clearRect(0,0,wvCv.width,wvCv.height);
  WV.forEach(w=>{
    w.ph+=w.sp;
    const by=wvCv.height*w.ry;
    wvCx.beginPath(); wvCx.moveTo(0,by);
    for(let x=0;x<=wvCv.width;x+=3){
      const y=by+Math.sin(x*w.f+w.ph)*w.a+Math.sin(x*w.f*1.7+w.ph*.6)*(w.a*.35);
      wvCx.lineTo(x,y);
    }
    wvCx.lineTo(wvCv.width,wvCv.height); wvCx.lineTo(0,wvCv.height); wvCx.closePath();
    const g=wvCx.createLinearGradient(0,by-w.a,0,by+w.a*2);
    g.addColorStop(0,`rgba(255,255,255,${w.op})`);
    g.addColorStop(.5,`rgba(10,132,255,${w.op*.5})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    wvCx.fillStyle=g; wvCx.fill();
    wvCx.beginPath(); wvCx.moveTo(0,by);
    for(let x=0;x<=wvCv.width;x+=3){
      const y=by+Math.sin(x*w.f+w.ph)*w.a+Math.sin(x*w.f*1.7+w.ph*.6)*(w.a*.35);
      wvCx.lineTo(x,y);
    }
    wvCx.strokeStyle=`rgba(180,210,255,${w.op*1.8})`; wvCx.lineWidth=.8; wvCx.stroke();
  });
  requestAnimationFrame(drawWaves);
}

/* ════════════════════════════════
   ORB CANVAS
════════════════════════════════ */
const orb=document.getElementById('orb');
const oc=orb.getContext('2d');
const OW=260, OH=260, OCX=130, OCY=130, OR=82;

let orbT=0, orbAmp=2, orbTargetAmp=2, orbModo='standby';

// Color palettes per state — subtle, glass-like
const ORB_COLORS={
  standby:    {inner:'rgba(15,40,120,0.85)',  mid:'rgba(10,80,200,0.7)',   outer:'rgba(10,132,255,0.5)',  stroke:'rgba(100,180,255,0.6)'},
  ouvindo:    {inner:'rgba(10,80,40,0.85)',   mid:'rgba(20,150,70,0.7)',   outer:'rgba(48,209,88,0.5)',   stroke:'rgba(100,220,140,0.7)'},
  processando:{inner:'rgba(100,60,0,0.85)',   mid:'rgba(180,110,0,0.7)',   outer:'rgba(255,159,10,0.5)',  stroke:'rgba(255,190,80,0.7)'},
  falando:    {inner:'rgba(0,50,140,0.85)',   mid:'rgba(0,100,220,0.7)',   outer:'rgba(10,132,255,0.6)',  stroke:'rgba(120,200,255,0.8)'},
};

let orbCurInner='rgba(15,40,120,0.85)', orbCurMid='rgba(10,80,200,0.7)', orbCurOuter='rgba(10,132,255,0.5)', orbCurStroke='rgba(100,180,255,0.6)';

function lerpColor(c1,c2,f){
  const p=s=>{const m=s.match(/[\d.]+/g).map(Number);return m;};
  const a=p(c1),b=p(c2);
  const r=a.map((v,i)=>v+(b[i]-v)*f);
  if(c1.startsWith('rgba')) return `rgba(${Math.round(r[0])},${Math.round(r[1])},${Math.round(r[2])},${r[3].toFixed(2)})`;
  return `rgb(${Math.round(r[0])},${Math.round(r[1])},${Math.round(r[2])})`;
}

function drawOrb(){
  oc.clearRect(0,0,OW,OH);
  const tgt=ORB_COLORS[orbModo]||ORB_COLORS.standby;
  orbCurInner=lerpColor(orbCurInner,tgt.inner,.04);
  orbCurMid  =lerpColor(orbCurMid,  tgt.mid,  .04);
  orbCurOuter=lerpColor(orbCurOuter,tgt.outer, .04);
  orbCurStroke=lerpColor(orbCurStroke,tgt.stroke,.04);

  // Outer glow rings
  for(let i=5;i>0;i--){
    const gr=OR*1.6*(i/5)+orbAmp*.5;
    oc.beginPath(); oc.arc(OCX,OCY,gr,0,Math.PI*2);
    const ga=oc.createRadialGradient(OCX,OCY,0,OCX,OCY,gr);
    ga.addColorStop(0,'rgba(0,0,0,0)');
    ga.addColorStop(.7,'rgba(0,0,0,0)');
    ga.addColorStop(1,orbCurOuter.replace(/[\d.]+\)/,`${.04*i})`));
    oc.fillStyle=ga; oc.fill();
  }

  // Main blob
  const N=220; oc.beginPath();
  for(let i=0;i<=N;i++){
    const th=(2*Math.PI*i)/N;
    const wave=
      Math.sin(2*th+orbT)       *orbAmp*.30+
      Math.sin(3*th-orbT*1.3)   *orbAmp*.22+
      Math.sin(5*th+orbT*.9)    *orbAmp*.14+
      Math.sin(7*th-orbT*1.1)   *orbAmp*.09+
      Math.sin(th*1.5+orbT*.5)  *orbAmp*.14+
      Math.sin(11*th+orbT*1.7)  *orbAmp*.05;
    const rad=OR+wave;
    const x=OCX+rad*Math.cos(th), y=OCY+rad*Math.sin(th);
    i===0?oc.moveTo(x,y):oc.lineTo(x,y);
  }
  oc.closePath();

  // Glass-like gradient fill
  const gf=oc.createRadialGradient(OCX-OR*.2,OCY-OR*.35,OR*.05,OCX,OCY,OR+orbAmp);
  gf.addColorStop(0,  orbCurOuter);
  gf.addColorStop(.45,orbCurMid);
  gf.addColorStop(1,  orbCurInner);
  oc.fillStyle=gf; oc.fill();

  // Stroke
  oc.strokeStyle=orbCurStroke; oc.lineWidth=1.2; oc.stroke();

  // Glass highlight — top left shine
  oc.beginPath(); oc.arc(OCX-OR*.28,OCY-OR*.42,OR*.10,0,Math.PI*2);
  const gh=oc.createRadialGradient(OCX-OR*.28,OCY-OR*.42,0,OCX-OR*.28,OCY-OR*.42,OR*.10);
  gh.addColorStop(0,'rgba(255,255,255,0.22)'); gh.addColorStop(1,'rgba(255,255,255,0)');
  oc.fillStyle=gh; oc.fill();

  // Secondary smaller highlight
  oc.beginPath(); oc.arc(OCX+OR*.3,OCY-OR*.1,OR*.05,0,Math.PI*2);
  const gh2=oc.createRadialGradient(OCX+OR*.3,OCY-OR*.1,0,OCX+OR*.3,OCY-OR*.1,OR*.05);
  gh2.addColorStop(0,'rgba(255,255,255,0.12)'); gh2.addColorStop(1,'rgba(255,255,255,0)');
  oc.fillStyle=gh2; oc.fill();

  // Speed & amplitude per mode
  const spd={standby:.007,ouvindo:.08,processando:.14,falando:.18};
  const tgt2={standby:2,ouvindo:18,processando:28,falando:42};
  orbT+=spd[orbModo]||.007;
  orbTargetAmp=tgt2[orbModo]||2;
  orbAmp+=(orbTargetAmp-orbAmp)*.08;

  requestAnimationFrame(drawOrb);
}

/* ════════════════════════════════
   AUDIO
════════════════════════════════ */
let audioCtx=null, audioPendente=null, ocupado=false;
const USER_ID = (()=>{
  // Pega user_id de query string ?u=xxx ou usa fallback
  const p=new URLSearchParams(location.search);
  return p.get('u')||'jonas';
})();

async function tocarAudio(b64){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') await audioCtx.resume();
    const bin=atob(b64), bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const buf=await audioCtx.decodeAudioData(bytes.buffer);
    const src=audioCtx.createBufferSource();
    src.buffer=buf; src.connect(audioCtx.destination);
    src.onended=()=>{
      setModo('standby'); limparResposta();
      transcriptEl.textContent='';
      playBtn.style.display='none'; audioPendente=null; ocupado=false;
      escutarWake();
    };
    src.start(0); playBtn.style.display='none'; return true;
  }catch(e){ ocupado=false; return false; }
}

/* ════════════════════════════════
   SPEECH RECOGNITION
════════════════════════════════ */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recAtivo=null, ativo=false, pauseTimer=null, transcriptAcum='';

// Wake words — mais específicas para evitar falsos positivos
const WAKE_WORDS=['jarvis','jarves','jarvi','jarviz'];

function iniciar(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ov=document.getElementById('overlay');
  ov.classList.add('hide');
  setTimeout(()=>ov.style.display='none',900);
  ativo=true; escutarWake();
}

function pararRec(){
  if(recAtivo){try{recAtivo.stop();}catch(e){} recAtivo=null;}
  clearTimeout(pauseTimer);
}

function escutarWake(){
  if(!SR||!ativo||ocupado) return;
  pararRec(); setModo('standby');
  const rec=new SR();
  rec.lang='pt-BR'; rec.continuous=false; rec.interimResults=false; rec.maxAlternatives=3;
  recAtivo=rec;
  rec.onresult=(e)=>{
    for(let r=0;r<e.results.length;r++){
      for(let a=0;a<e.results[r].length;a++){
        const txt=e.results[r][a].transcript.toLowerCase().trim();
        if(WAKE_WORDS.some(w=>txt.includes(w))){
          recAtivo=null; ouvirComando(); return;
        }
      }
    }
    recAtivo=null; escutarWake();
  };
  rec.onerror=()=>{ recAtivo=null; if(ativo&&!ocupado) setTimeout(escutarWake,300); };
  rec.onend=()=>{ if(recAtivo===rec) recAtivo=null; if(ativo&&!ocupado&&orbModo==='standby') setTimeout(escutarWake,100); };
  try{ rec.start(); }catch(e){ recAtivo=null; setTimeout(escutarWake,500); }
}

function ouvirComando(){
  if(ocupado) return;
  pararRec(); setModo('ouvindo');
  transcriptAcum=''; transcriptEl.textContent='';
  const rec=new SR();
  rec.lang='pt-BR'; rec.continuous=true; rec.interimResults=true; rec.maxAlternatives=1;
  recAtivo=rec;
  rec.onresult=(e)=>{
    let interim='', final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const txt=e.results[i][0].transcript;
      if(e.results[i].isFinal) final+=txt; else interim+=txt;
    }
    if(final) transcriptAcum+=final;
    transcriptEl.textContent=transcriptAcum||interim;
    clearTimeout(pauseTimer);
    if(transcriptAcum||final){
      pauseTimer=setTimeout(()=>{
        const p=transcriptAcum.trim();
        if(p&&!ocupado){ try{rec.stop();}catch(e){} recAtivo=null; processarPergunta(p); }
      },1600);
    }
  };
  rec.onerror=()=>{
    clearTimeout(pauseTimer); recAtivo=null;
    const p=transcriptAcum.trim();
    if(p&&!ocupado) processarPergunta(p);
    else if(!ocupado){ setModo('standby'); transcriptEl.textContent=''; setTimeout(escutarWake,200); }
  };
  rec.onend=()=>{
    clearTimeout(pauseTimer);
    if(recAtivo===rec) recAtivo=null;
    if(orbModo==='ouvindo'&&!ocupado){
      const p=transcriptAcum.trim();
      if(p) processarPergunta(p);
      else{ setModo('standby'); transcriptEl.textContent=''; setTimeout(escutarWake,200); }
    }
  };
  try{ rec.start(); }catch(e){ recAtivo=null; setModo('standby'); setTimeout(escutarWake,500); }
}

/* ════════════════════════════════
   API
════════════════════════════════ */
async function processarPergunta(pergunta){
  if(ocupado) return;
  ocupado=true; pararRec(); setModo('processando');
  transcriptEl.textContent=pergunta; limparResposta();

  // Timeout de 20s para não travar
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),20000);

  try{
    const res=await fetch('/perguntar',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pergunta, user_id:USER_ID}),
      signal:controller.signal
    });
    clearTimeout(timeout);
    if(!res.ok) throw new Error('API error '+res.status);
    const dados=await res.json();
    if(dados.erro) throw new Error(dados.erro);

    mostrarResposta(dados.resposta);
    setModo('falando');
    audioPendente=dados.audio;
    const ok=await tocarAudio(dados.audio);
    if(!ok){ playBtn.style.display='block'; ocupado=false; }
  }catch(err){
    clearTimeout(timeout);
    ocupado=false; setModo('standby');
    transcriptEl.textContent='';
    if(err.name!=='AbortError') console.error('Jarvis error:',err);
    setTimeout(escutarWake,300);
  }
}

/* ── Tap orb to speak ── */
orb.addEventListener('click',()=>{
  if(ativo&&orbModo==='standby'&&!ocupado) ouvirComando();
});
</script>
