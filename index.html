<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquid Holographic Sphere</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    height:100vh;

    background:#000;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Arial, sans-serif;

}

canvas{

    position:absolute;

    width:100%;

    height:100%;

}

.interface{

    position:absolute;

    bottom:30px;

    color:white;

    text-align:center;

    z-index:2;

    opacity:.7;

}

.interface h1{

    font-size:18px;

    letter-spacing:4px;

    text-shadow:

    0 0 15px #00ffff,

    0 0 30px #ff00ff;

}

</style>

</head>

<body>

<canvas id="sphere"></canvas>

<div class="interface">

<h1>LIQUID HOLOGRAM AI</h1>

</div>

<script>

const canvas = document.getElementById("sphere");

const ctx = canvas.getContext("2d");

let w,h;

let t=0;

function resize(){

    w=canvas.width=window.innerWidth;

    h=canvas.height=window.innerHeight;

}

resize();

window.onresize=resize;

let particles=[];

for(let i=0;i<120;i++){

    particles.push({

        a:Math.random()*Math.PI*2,

        r:120+Math.random()*100,

        s:0.005+Math.random()*0.02

    });

}

function draw(){

ctx.clearRect(0,0,w,h);

let cx=w/2;

let cy=h/2;

let radius=170;

// aura holográfica

let glow=ctx.createRadialGradient(

cx,cy,30,

cx,cy,260

);

glow.addColorStop(0,"rgba(0,255,255,.5)");

glow.addColorStop(.5,"rgba(255,0,255,.25)");

glow.addColorStop(1,"transparent");

ctx.fillStyle=glow;

ctx.beginPath();

ctx.arc(cx,cy,260,0,Math.PI*2);

ctx.fill();

// esfera líquida

let sphere=ctx.createRadialGradient(

cx-50,cy-60,20,

cx,cy,radius

);

sphere.addColorStop(0,"#ffffff");

sphere.addColorStop(.25,"#00ffff");

sphere.addColorStop(.7,"#7b00ff");

sphere.addColorStop(1,"#ff008c");

ctx.save();

ctx.translate(cx,cy);

ctx.rotate(t*0.3);

ctx.beginPath();

for(let i=0;i<=360;i++){

let angle=i*Math.PI/180;

let wave=

Math.sin(angle*8+t*3)*12+

Math.sin(angle*14-t*2)*6;

let r=radius+wave;

let x=Math.cos(angle)*r;

let y=Math.sin(angle)*r;

if(i==0)

ctx.moveTo(x,y);

else

ctx.lineTo(x,y);

}

ctx.closePath();

ctx.fillStyle=sphere;

ctx.shadowBlur=40;

ctx.shadowColor="#ff00ff";

ctx.fill();

ctx.restore();

// gotas líquidas

for(let p of particles){

p.a+=p.s;

let x=

cx+

Math.cos(p.a)*p.r+

Math.sin(t*2+p.a)*15;

let y=

cy+

Math.sin(p.a)*p.r+

Math.cos(t*2+p.a)*15;

let size=4+Math.sin(t*5+p.a)*3;

let g=ctx.createRadialGradient(

x,y,0,

x,y,size*3

);

g.addColorStop(0,"#ffffff");

g.addColorStop(.4,"#00ffff");

g.addColorStop(1,"transparent");

ctx.fillStyle=g;

ctx.beginPath();

ctx.arc(x,y,size,0,Math.PI*2);

ctx.fill();

}

// brilho interno

ctx.beginPath();

ctx.arc(cx-40,cy-50,45,0,Math.PI*2);

ctx.fillStyle="rgba(255,255,255,.25)";

ctx.fill();

t+=0.01;

requestAnimationFrame(draw);

}

draw();

</script>

</body>

</html>
